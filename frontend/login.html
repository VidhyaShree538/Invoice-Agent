<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Invoice Processing Agent</title>
  <meta name="description" content="Sign in to the AI-Powered Invoice Processing Agent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --card-bg: rgba(15, 19, 28, 0.85);
      --border: rgba(255,255,255,0.07);
      --input-bg: rgba(255,255,255,0.04);
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.35);
      --accent-hover: #4f46e5;
      --success: #10b981;
      --danger: #f43f5e;
      --text: #f3f4f6;
      --muted: #9ca3af;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text);
    }

    /* Animated gradient background */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.22) 0%, transparent 70%);
      top: -200px; left: -150px;
      animation-duration: 14s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation-duration: 10s;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      top: 50%; left: 60%;
      animation-duration: 16s;
      animation-delay: -7s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Subtle grid overlay */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
      animation: fade-up 0.6s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .brand {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin-bottom: 1rem;
      box-shadow: 0 8px 30px var(--accent-glow);
      animation: icon-pulse 3s ease-in-out infinite;
    }

    @keyframes icon-pulse {
      0%, 100% { box-shadow: 0 8px 30px rgba(99,102,241,0.35); }
      50%       { box-shadow: 0 8px 45px rgba(99,102,241,0.55); }
    }

    .brand-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 20%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .card-subtitle {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    /* Form */
    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.75rem;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      background: rgba(99,102,241,0.06);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    input::placeholder { color: rgba(156,163,175,0.5); }

    .toggle-pw {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1rem;
      color: var(--muted);
      background: none;
      border: none;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-pw:hover { color: var(--text); }

    /* Remember me */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .remember-row input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      padding: 0;
      margin: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px var(--accent-glow);
      letter-spacing: 0.02em;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99,102,241,0.5);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error message */
    .error-msg {
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--danger);
      margin-bottom: 1.25rem;
      animation: fade-up 0.3s ease both;
    }

    .error-msg.visible { display: flex; }

    /* Demo credentials hint */
    .demo-hint {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 12px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .demo-hint strong { color: #a5b4fc; }

    .demo-cred {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border-radius: 6px;
      padding: 0.1rem 0.45rem;
      font-family: monospace;
      font-size: 0.88rem;
      color: #c7d2fe;
      cursor: pointer;
      transition: background 0.2s;
    }

    .demo-cred:hover { background: rgba(99,102,241,0.3); }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(156,163,175,0.5);
    }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Login panel -->
  <div class="login-wrapper" role="main">
    <div class="brand">
      <div class="brand-icon">🧾</div>
      <div class="brand-title">Invoice Agent</div>
      <div class="brand-sub">AI-Powered Document Processing</div>
    </div>

    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-subtitle">Sign in to access your invoice dashboard</div>

      <div class="error-msg" id="error-msg" role="alert">
        <span>⚠️</span>
        <span id="error-text">Invalid username or password.</span>
      </div>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" name="username"
              placeholder="Enter your username"
              autocomplete="username" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" name="password"
              placeholder="Enter your password"
              autocomplete="current-password" required>
            <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">👁️</button>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" id="remember-me"> Keep me signed in
        </label>

        <button type="submit" class="btn-login" id="login-btn">
          Sign In →
        </button>
      </form>

      <div class="demo-hint">
        <strong>🔑 Demo Credentials</strong><br>
        Username: <span class="demo-cred" id="fill-user" title="Click to fill">admin</span> &nbsp;
        Password: <span class="demo-cred" id="fill-pass" title="Click to fill">admin123</span>
      </div>
    </div>

    <div class="login-footer">
      Invoice Processing Agent &mdash; College Project &copy; 2026
    </div>
  </div>

  <script>
    // Auto-fill demo credentials on click
    document.getElementById('fill-user').addEventListener('click', () => {
      document.getElementById('username').value = 'admin';
    });
    document.getElementById('fill-pass').addEventListener('click', () => {
      document.getElementById('password').value = 'admin123';
    });

    // Password toggle
    const pwInput = document.getElementById('password');
    document.getElementById('toggle-pw').addEventListener('click', function () {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      this.textContent = isText ? '👁️' : '🙈';
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('ia_auth') || localStorage.getItem('ia_auth')) {
      window.location.replace('/upload');
    }

    // Login form submission
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember-me').checked;
      const errorEl  = document.getElementById('error-msg');
      const errorTxt = document.getElementById('error-text');
      const btn      = document.getElementById('login-btn');

      errorEl.classList.remove('visible');

      // Simple credential check (demo-level auth for college project)
      const VALID_USERS = {
        'admin':   'admin123',
        'invoice': 'invoice@2026',
      };

      if (!username || !password) {
        errorTxt.textContent = 'Please enter both username and password.';
        errorEl.classList.add('visible');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      // Simulate brief network delay for UX
      setTimeout(() => {
        if (VALID_USERS[username] && VALID_USERS[username] === password) {
          const userData = JSON.stringify({ username, loginTime: Date.now() });
          if (remember) {
            localStorage.setItem('ia_auth', userData);
          } else {
            sessionStorage.setItem('ia_auth', userData);
          }
          btn.textContent = '✅ Redirecting…';
          window.location.replace('/upload');
        } else {
          errorTxt.textContent = 'Invalid username or password. Try admin / admin123.';
          errorEl.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign In →';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 600);
    });
  </script>
</body>
</html>
